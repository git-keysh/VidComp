version: '3.8'

services:
  video-compressor:
    build: .
    container_name: video-compressor
    restart: unless-stopped
    ports:
      - "1082:1082"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./temp:/app/temp
    environment:
      - NODE_ENV=production
      - PORT=1082
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1082/health"]
      interval: 30s
      timeout: 10s
      retries: 3