<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OP Compressor Studio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0a0d12;
    --panel:#0f141c;
    --panel2:#0c1118;
    --border:#1b2430;
    --text:#e6edf3;
    --muted:#7d8a99;
    --accent:#4f8cff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    display:flex;
    min-height:100vh;
    animation:fadeIn .35s ease-out;
}

/* ANIMATIONS */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:var(--panel);
    border-right:1px solid var(--border);
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.logo{
    font-size:15px;
    font-weight:600;
    margin-bottom:8px;
}

.nav-item{
    padding:10px;
    background:var(--panel2);
    border:1px solid var(--border);
    font-size:13px;
    color:var(--muted);
    cursor:pointer;
    transition:.15s ease;
}

.nav-item:hover{
    border-color:var(--accent);
    color:var(--accent);
    transform:translateX(2px);
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.title{
    font-size:18px;
    font-weight:500;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:14px;
}

/* BOX */
.box{
    background:var(--panel);
    border:1px solid var(--border);
    padding:14px;
    transition:.15s ease;
}

.box:hover{
    transform:translateY(-2px);
    border-color:var(--accent);
}

/* DROPZONE */
.dropzone{
    height:150px;
    border:1px dashed var(--border);
    background:var(--panel2);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    font-size:13px;
    color:var(--muted);
    cursor:pointer;
    transition:.2s ease;
}

.dropzone.dragover{
    border-color:var(--accent);
    color:var(--accent);
    transform:scale(1.01);
}

/* INPUTS */
label{
    font-size:11px;
    color:var(--muted);
    display:block;
    margin-bottom:5px;
}

input,select{
    width:100%;
    padding:8px;
    background:var(--panel2);
    border:1px solid var(--border);
    color:var(--text);
    font-size:13px;
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

/* BUTTON */
.btn{
    width:100%;
    margin-top:12px;
    padding:10px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--text);
    cursor:pointer;
    transition:.15s ease;
}

.btn:hover{
    border-color:var(--accent);
    color:var(--accent);
}

.btn:active{
    transform:scale(.98);
}

/* FILE LIST */
.filelist{
    margin-top:10px;
    font-size:12px;
    color:var(--muted);
}

/* RESULTS */
.results{
    margin-top:10px;
    padding:12px;
    border:1px solid var(--border);
    background:var(--panel);
    font-size:12px;
    color:var(--muted);
    display:none;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">🎬 OP Compressor</div>
    <div class="nav-item" data-tab="upload">Upload</div>
    <div class="nav-item" data-tab="settings">Settings</div>
    <div class="nav-item" data-tab="queue">Queue</div>
    <div class="nav-item" data-tab="results">Results</div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <div class="title">Video Compression Studio</div>
    </div>

    <!-- UPLOAD + SETTINGS -->
    <div class="grid" id="uploadTab">

        <div class="box">
            <div class="dropzone" id="dropzone">
                Drop videos or click to upload
                <input type="file" id="fileInput" multiple hidden>
            </div>
            <div class="filelist" id="fileList"></div>
        </div>

        <div class="box">

            <label>Target Size</label>
            <div class="row">
                <input type="number" id="targetSize" value="50">
                <select id="sizeUnit">
                    <option>MB</option>
                    <option>GB</option>
                    <option>KB</option>
                </select>
            </div>

            <div style="margin-top:10px">
                <label>Quality</label>
                <select id="quality">
                    <option>Low</option>
                    <option selected>Medium</option>
                    <option>High</option>
                </select>
            </div>

            <div style="margin-top:10px">
                <label>Speed</label>
                <select id="preset">
                    <option>ultrafast</option>
                    <option>fast</option>
                    <option selected>medium</option>
                    <option>slow</option>
                </select>
            </div>

            <button class="btn" id="compressBtn">Compress</button>

        </div>

    </div>

    <!-- QUEUE -->
    <div class="box" id="queueTab" style="display:none;">
        Queue is empty.
    </div>

    <!-- RESULTS -->
    <div class="results" id="resultsTab">
        No results yet.
    </div>

</div>

<script>
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const fileList = document.getElementById("fileList");

const tabs = {
    upload: document.getElementById("uploadTab"),
    queue: document.getElementById("queueTab"),
    results: document.getElementById("resultsTab")
};

let files = [];

/* SIDEBAR NAV */
document.querySelectorAll(".nav-item").forEach(btn=>{
    btn.onclick = () => {
        Object.values(tabs).forEach(t => t.style.display = "none");

        const tab = btn.dataset.tab;
        if(tabs[tab]) tabs[tab].style.display = "block";
    };
});

/* DROPZONE */
dropzone.onclick = () => fileInput.click();

dropzone.ondragover = e => {
    e.preventDefault();
    dropzone.classList.add("dragover");
};

dropzone.ondragleave = () => {
    dropzone.classList.remove("dragover");
};

dropzone.ondrop = e => {
    e.preventDefault();
    dropzone.classList.remove("dragover");
    handleFiles(e.dataTransfer.files);
};

fileInput.onchange = e => handleFiles(e.target.files);

function handleFiles(f){
    files = [...files, ...f];
    renderFiles();
}

function renderFiles(){
    fileList.innerHTML = files.map(f => `• ${f.name}`).join("<br>");
}

/* FAKE COMPRESS BUTTON UI */
document.getElementById("compressBtn").onclick = () => {
    const results = document.getElementById("resultsTab");
    results.style.display = "block";
    results.innerHTML = "Processing " + files.length + " file(s)...";

    setTimeout(()=>{
        results.innerHTML = files.map(f =>
            `✔ ${f.name} → compressed.mp4`
        ).join("<br>");
    }, 1200);
};
</script>

</body>
</html>
